<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop - Agenda de Serviços</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Lançamentos de Serviços</h2>
        <a th:href="@{/lancamentos/novo}" class="btn btn-success fw-bold">+ Novo Agendamento</a>
    </div>

    <!-- Tabela de Agenda -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0 table-responsive">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-primary">
                <tr>
                    <th class="ps-4">Data</th>
                    <th>Animal</th>
                    <th>Serviço</th>
                    <th>Valor Cobrado (R$)</th>
                    <th>Observações</th>
                    <th class="text-center pe-4">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lan : ${listaLancamentos}">
                    <td class="ps-4 fw-semibold" th:text="${#temporals.format(lan.data, 'dd/MM/yyyy')}"></td>
                    <td th:text="${lan.animal != null ? lan.animal.nome : 'N/A'}"></td>
                    <td th:text="${lan.servico != null ? lan.servico.nome : 'N/A'}"></td>
                    <td class="fw-bold text-success" th:text="'R$ ' + ${lan.valorCobrado}"></td>
                    <td th:text="${lan.observacoes}"></td>
                    <td class="text-center pe-4">
                        <a th:href="@{/lancamentos/editar/{id}(id=${lan.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <a th:href="@{/lancamentos/excluir/{id}(id=${lan.id})}"
                           onclick="return confirm('Deseja realmente cancelar este agendamento?');" class="btn btn-sm btn-outline-danger">Excluir</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listaLancamentos)}">
                    <td colspan="6" class="text-center text-muted py-4">Nenhum atendimento agendado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a th:href="@{/proprietarios}" class="btn btn-outline-secondary btn-sm">Proprietários</a>
        <a th:href="@{/animais}" class="btn btn-outline-secondary btn-sm">Animais</a>
        <a th:href="@{/servicos}" class="btn btn-outline-secondary btn-sm">Serviços</a>
        <a th:href="@{/relatorios}" class="btn btn-outline-secondary btn-sm">Relatório</a>
    </div>

</div>

</body>
</html>
