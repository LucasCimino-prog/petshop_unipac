<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop - Animais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Lista de Animais</h2>
        <a th:href="@{/animais/novo}" class="btn btn-success fw-bold">+ Cadastrar Novo Pet</a>
    </div>

    <div th:if="${mensagemErro}" class="alert alert-danger fw-bold shadow-sm mb-4" role="alert">
        <span th:text="${mensagemErro}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0 table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-primary">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Espécie</th>
                    <th>Raça</th>
                    <th>Idade</th>
                    <th>Sexo</th>
                    <th>Peso</th>
                    <th>Dono</th>
                    <th class="text-center pe-4">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pet : ${listaAnimais}">
                    <td class="ps-4" th:text="${pet.id}"></td>
                    <td>
                        <img th:if="${pet.fotoUrl != null}" th:src="@{/uploads/{foto}(foto=${pet.fotoUrl})}"
                             alt="Foto do Pet" class="img-thumbnail" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;" />
                        <span th:if="${pet.fotoUrl == null}" class="badge bg-secondary">Sem Foto</span>
                    </td>
                    <td class="fw-semibold" th:text="${pet.nome}"></td>
                    <td th:text="${pet.especie}"></td>
                    <td th:text="${pet.raca}"></td>
                    <td th:text="${pet.idade} != null ? ${pet.idade} + ' anos' : '-'"></td>
                    <td th:text="${pet.sexo}"></td>
                    <td th:text="${pet.peso} != null ? ${pet.peso} + ' kg' : '-'"></td>
                    <td th:text="${pet.proprietario != null ? pet.proprietario.nome : 'Sem Dono'}"></td>
                    <td class="text-center pe-4">
                        <a th:href="@{/animais/editar/{id}(id=${pet.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <a th:href="@{/animais/excluir/{id}(id=${pet.id})}"
                           onclick="return confirm('Excluir este pet?');" class="btn btn-sm btn-outline-danger">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a th:href="@{/proprietarios}" class="btn btn-outline-secondary btn-sm">Proprietários</a>
        <a th:href="@{/servicos}" class="btn btn-outline-secondary btn-sm">Serviços</a>
        <a th:href="@{/lancamentos}" class="btn btn-outline-secondary btn-sm">Lançamentos</a>
        <a th:href="@{/relatorios}" class="btn btn-outline-secondary btn-sm">Relatórios</a>
    </div>

</div>

</body>
</html>
