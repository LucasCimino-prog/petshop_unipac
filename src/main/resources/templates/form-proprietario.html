<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Proprietário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0 text-center">Cadastrar / Editar Proprietário</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${mensagemErro}" class="alert alert-danger fw-bold shadow-sm" role="alert">
                        <span th:text="${mensagemErro}"></span>
                    </div>

                    <form th:action="@{/proprietarios/salvar}" th:object="${proprietario}" method="post" class="row g-3"
                          onsubmit="if(this.cpf.value.length !== 11) { alert('Erro: O CPF precisa ter exatamente 11 números.'); return false; } if(this.telefone.value.length !== 11) { alert('Erro: O celular precisa ter exatamente 11 números.'); return false; }">

                        <input type="hidden" th:field="*{id}" />

                        <div class="col-md-7">
                            <label class="form-label fw-semibold">Nome Completo <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{nome}" class="form-control" required />
                        </div>

                        <div class="col-md-5">
                            <label class="form-label fw-semibold">CPF (Apenas números) <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{cpf}" class="form-control"
                                   required maxlength="11" pattern="\d{11}" placeholder="Ex: 12345678900" title="O CPF deve conter exatamente 11 números"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                        </div>

                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Rua <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{rua}" class="form-control" required />
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Número <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{numero}" class="form-control" required
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Bairro <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{bairro}" class="form-control" required />
                        </div>

                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Celular (DDD + Número) <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{telefone}" class="form-control"
                                   required maxlength="11" pattern="\d{11}" placeholder="Ex: 32988887777" title="O telefone deve conter exatamente 11 números"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                        </div>

                        <div class="col-md-7">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" th:field="*{email}" class="form-control" required placeholder="exemplo@email.com" />
                        </div>

                        <div class="col-12 mt-4 d-flex justify-content-between">
                            <a th:href="@{/proprietarios}" class="btn btn-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-success fw-bold px-4">Salvar Proprietário</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
