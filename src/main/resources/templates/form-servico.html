<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0 text-center">Cadastrar Serviço</h4>
                </div>
                <div class="card-body p-4">

                    <!-- Alerta de Erro -->
                    <div th:if="${mensagemErro}" class="alert alert-danger fw-bold shadow-sm" role="alert">
                        <span th:text="${mensagemErro}"></span>
                    </div>

                    <form th:action="@{/servicos/salvar}" th:object="${servico}" method="post" class="row g-3">
                        <input type="hidden" th:field="*{id}" />

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nome do Serviço <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{nome}" class="form-control" required placeholder="ex: Banho, Tosa" />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Preço Sugerido (R$) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" th:field="*{preco}" class="form-control" required />
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Descrição</label>
                            <input type="text" th:field="*{descricao}" class="form-control" placeholder="Detalhes adicionais sobre o serviço" />
                        </div>

                        <div class="col-12 mt-4 d-flex justify-content-between">
                            <a th:href="@{/servicos}" class="btn btn-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-success fw-bold px-4">Salvar Serviço</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
