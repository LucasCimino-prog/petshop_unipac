<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Serviço</title>
</head>
<body>
<h1>Cadastrar Serviço</h1>

<div th:if="${mensagemErro}" style="color: red; font-weight: bold; background-color: #fee; padding: 10px; border: 1px solid red; margin-bottom: 15px;">
    <span th:text="${mensagemErro}"></span>
</div>

<form th:action="@{/servicos/salvar}" th:object="${servico}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div>
        <label>Nome do Serviço (ex: Banho, Tosa):</label>
        <input type="text" th:field="*{nome}" required />
    </div>
    <br>
    <div>
        <label>Descrição:</label>
        <input type="text" th:field="*{descricao}" />
    </div>
    <br>
    <div>
        <label>Preço Sugerido (R$):</label>
        <input type="number" step="0.01" th:field="*{preco}" required />
    </div>
    <br>

    <button type="submit">Salvar Serviço</button>
    <a th:href="@{/servicos}">Cancelar</a>
</form>
</body>
</html>
