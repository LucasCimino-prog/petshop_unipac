<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendar Atendimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0 text-center">Agendar / Editar Atendimento</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${mensagemErro}" class="alert alert-danger fw-bold shadow-sm" role="alert">
                        <span th:text="${mensagemErro}"></span>
                    </div>

                    <form th:action="@{/lancamentos/salvar}" th:object="${lancamento}" method="post" class="row g-3">
                        <input type="hidden" th:field="*{id}" />

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Data Agendada <span class="text-danger">*</span></label>
                            <input type="date" th:field="*{data}" class="form-control" required />
                        </div>

                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Animal Cadastrado <span class="text-danger">*</span></label>
                            <select th:field="*{animal}" class="form-select" required>
                                <option value="">Selecione o pet...</option>
                                <option th:each="pet : ${listaAnimais}"
                                        th:value="${pet.id}"
                                        th:text="${pet.nome}"></option>
                            </select>
                        </div>

                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Serviço Realizado <span class="text-danger">*</span></label>
                            <select th:field="*{servico}" id="selectServico" onchange="atualizarPreco()" class="form-select" required>
                                <option value="" data-preco="">Selecione o serviço...</option>
                                <option th:each="serv : ${listaServicos}"
                                        th:value="${serv.id}"
                                        th:text="${serv.nome}"
                                        th:data-preco="${serv.preco}"></option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Valor Cobrado (R$) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" th:field="*{valorCobrado}" id="inputValor" class="form-control" required />
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Observações</label>
                            <textarea th:field="*{observacoes}" class="form-control" rows="3" placeholder="Ex: Buscar o animal as 14h..."></textarea>
                        </div>

                        <div class="col-12 mt-4 d-flex justify-content-between">
                            <a th:href="@{/lancamentos}" class="btn btn-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-success fw-bold px-4">Salvar Agendamento</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function atualizarPreco() {
        var select = document.getElementById("selectServico");
        var opcaoSelecionada = select.options[select.selectedIndex];
        var preco = opcaoSelecionada.getAttribute("data-preco");
        var inputValor = document.getElementById("inputValor");

        if (preco) {
            inputValor.value = preco;
        } else {
            inputValor.value = "";
        }
    }

    window.onload = function() {
        var hoje = new Date().toISOString().split('T')[0];
        var campoData = document.getElementById("data");

        // Bloqueia dias anteriores apenas se o campo data estiver vazio (novo agendamento)
        if(campoData && !campoData.value) {
            campoData.setAttribute('min', hoje);
        }
    };
</script>

</body>
</html>
