<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop - Proprietários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Lista de Proprietários</h2>
        <a th:href="@{/proprietarios/novo}" class="btn btn-success fw-bold">+ Cadastrar Novo Proprietário</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Endereço Completo</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th class="text-center pe-4">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prop : ${listaProprietarios}">
                    <td class="ps-4" th:text="${prop.id}"></td>
                    <td th:text="${prop.nome}"></td>
                    <td th:text="${prop.cpf}"></td>

                    <td th:text="${prop.rua + ', ' + prop.numero + ' - ' + prop.bairro}"></td>

                    <td th:text="${prop.telefone}"></td>
                    <td th:text="${prop.email}"></td>
                    <td class="text-center pe-4">
                        <a th:href="@{/proprietarios/editar/{id}(id=${prop.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <a th:href="@{/proprietarios/excluir/{id}(id=${prop.id})}"
                           onclick="return confirm('Tem certeza que deseja excluir este cliente?');" class="btn btn-sm btn-outline-danger">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a th:href="@{/animais}" class="btn btn-outline-secondary btn-sm">Animais</a>
        <a th:href="@{/servicos}" class="btn btn-outline-secondary btn-sm">Serviços</a>
        <a th:href="@{/lancamentos}" class="btn btn-outline-secondary btn-sm">Lançamentos</a>
        <a th:href="@{/relatorios}" class="btn btn-outline-secondary btn-sm">Relatórios</a>
    </div>

</div>

</body>
</html>
